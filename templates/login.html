<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso Administrador – Basta y Punto</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href={{url_for('static', filename='css/login.css')}}>
</head>
<body>

  <div class="login-card">
    <div class="header-badge">Taller Interno</div>
    <h1>Basta <em>&</em> Punto</h1>
    <p class="desc">Ingresa tus credenciales para administrar el catálogo y los servicios.</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <p class="error-msg" style="display:block;">{{ messages[0] }}</p>
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('login') }}" method="POST">
      <input type="email" name="correo" placeholder="Correo de administrador" required autocomplete="email" />
      <input type="password" name="contrasena" placeholder="Contraseña segura" required autocomplete="current-password" />
      <button type="submit" class="send-btn">Acceder al Panel →</button>
    </form>

    <a href="/" class="back-link">← Volver a la vitrina pública</a>
  </div>

</body>
</html>
